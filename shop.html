<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Collection | Slightly Lowked</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="dark">
    <div class="noise"></div>

    <!-- Nav -->
    <nav class="nav-brutal">
        <a href="index.html" class="nav-home">HOME</a>
        <div class="nav-links-brutal">
            <a href="shop.html">SHOP</a>
            <a href="about.html">INFO</a>
        </div>
    </nav>

    <!-- Collection / Product Grid -->
    <section class="products-chaos">
        <h2 class="section-brutal">COLLECTION</h2>

        <div class="grid-broken">
            <a href="product.html" class="product-brutal" style="grid-column: 1; grid-row: 1;">
                <div class="product-placeholder">
                    <img src="images/SLIGHTLY LOWKED shirt.png" alt="SLIGHTLY LOWKED TEE">
                </div>
                <div class="product-label">
                    <span>SLIGHTLY LOWKED TEE</span>
                    <span class="price-brutal">$42</span>
                </div>
            </a>

            <a href="product.html" class="product-brutal" style="grid-column: 2; grid-row: 1 / 3;">
                <div class="product-placeholder tall">
                    <div class="placeholder-shape hoodie"></div>
                </div>
                <div class="product-label">
                    <span>FREQUENCY HOODIE</span>
                    <span class="price-brutal">$78</span>
                </div>
            </a>

            <a href="product.html" class="product-brutal" style="grid-column: 1; grid-row: 2;">
                <div class="product-placeholder">
                    <div class="placeholder-shape beanie"></div>
                </div>
                <div class="product-label">
                    <span>OBSERVER BEANIE</span>
                    <span class="price-brutal">$28</span>
                </div>
            </a>

            <a href="product.html" class="product-brutal" style="grid-column: 3; grid-row: 1;">
                <div class="product-placeholder">
                    <div class="placeholder-shape socks"></div>
                </div>
                <div class="product-label">
                    <span>CURRENT SOCKS</span>
                    <span class="price-brutal">$18</span>
                </div>
            </a>

            <a href="product.html" class="product-brutal" style="grid-column: 3; grid-row: 2;">
                <div class="product-placeholder">
                    <div class="placeholder-shape tee"></div>
                </div>
                <div class="product-label">
                    <span>OBSERVER TEE</span>
                    <span class="price-brutal">$42</span>
                </div>
            </a>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer-brutal footer-shop">
        <div class="footer-brutal-content">
            <p>COMPOSED IN CHAOS</p>
            
            <div class="footer-links-brutal">
                <a href="https://www.instagram.com/slightly_lowked__/" target="_blank" rel="noopener noreferrer">INSTAGRAM</a>
                <a href="#">CONTACT</a>
            </div>
        </div>
    </footer>
</body>
</html>
